<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAPLE & CO. — Everyday Essentials</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1E2420;
    --ink-soft:#3B443D;
    --sage:#DCE0D9;
    --paper:#F1F2EE;
    --brick:#A8402C;
    --gold:#C9A227;
    --line:#B9BEB2;
    --radius:14px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--sage);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit; text-decoration:none;}
  header{
    position:sticky; top:0; z-index:50;
    background:var(--paper);
    border-bottom:1px solid var(--line);
    padding:18px 6vw;
    display:flex; align-items:center; justify-content:space-between;
  }
  .brand{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:22px;
    letter-spacing:0.5px;
  }
  .brand span{color:var(--brick);}
  nav ul{list-style:none; display:flex; gap:32px;}
  nav a{
    font-size:13px; text-transform:uppercase; letter-spacing:1px;
    color:var(--ink-soft); font-weight:500;
  }
  nav a:hover{color:var(--brick);}
  .cart-pill{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    border:1px solid var(--ink);
    padding:6px 12px;
    border-radius:20px;
  }
  .hero{
    padding:80px 6vw 60px;
    max-width:820px;
  }
  .hero .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px; letter-spacing:2px; text-transform:uppercase;
    color:var(--brick); margin-bottom:18px; display:block;
  }
  .hero h1{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:clamp(34px, 5vw, 58px);
    line-height:1.08;
    letter-spacing:-0.5px;
  }
  .hero p{
    margin-top:20px;
    font-size:16px;
    color:var(--ink-soft);
    max-width:480px;
    line-height:1.6;
  }
  .filters{
    padding:0 6vw 30px;
    display:flex; gap:10px; flex-wrap:wrap;
  }
  .filter-btn{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    padding:8px 16px;
    border:1px solid var(--ink);
    border-radius:20px;
    background:transparent;
    cursor:pointer;
    transition:all .15s ease;
  }
  .filter-btn.active, .filter-btn:hover{
    background:var(--ink); color:var(--paper);
  }
  .grid{
    padding:0 6vw 100px;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
    gap:28px;
  }
  .tag-card{
    background:var(--paper);
    border-radius:var(--radius);
    position:relative;
    padding:20px 20px 22px;
    border:1px dashed var(--line);
    transition:transform .2s ease, box-shadow .2s ease;
  }
  .tag-card:hover{
    transform:translateY(-4px);
    box-shadow:0 12px 24px rgba(30,36,32,0.12);
  }
  .tag-hole{
    position:absolute;
    top:14px; left:20px;
    width:14px; height:14px;
    border-radius:50%;
    background:var(--sage);
    border:1px solid var(--line);
  }
  .tag-hole::after{
    content:'';
    position:absolute; inset:3px;
    border-radius:50%;
    background:var(--paper);
  }
  .art-frame{
    margin-top:18px;
    height:180px;
    border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    background:var(--sage);
    overflow:hidden;
  }
  .art-frame img{max-width:100%; max-height:100%; object-fit:cover; border-radius:8px;}
  .tag-meta{margin-top:16px;}
  .tag-meta .cat{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--ink-soft);
  }
  .tag-meta h3{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:19px;
    margin-top:4px;
  }
  .tag-meta .price{
    font-family:'IBM Plex Mono', monospace;
    font-size:14px;
    margin-top:6px;
    color:var(--brick);
  }
  .tryon-btn{
    margin-top:16px;
    width:100%;
    padding:11px 0;
    background:var(--ink);
    color:var(--paper);
    border:none;
    border-radius:8px;
    font-size:13px;
    font-weight:500;
    letter-spacing:0.3px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:8px;
    transition:background .15s ease;
  }
  .tryon-btn:hover{background:var(--brick);}
  footer{
    border-top:1px solid var(--line);
    padding:40px 6vw;
    background:var(--paper);
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:16px;
  }
  footer .f-brand{font-family:'Fraunces', serif; font-size:16px;}
  footer .f-note{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px; color:var(--ink-soft);
  }
  @media (max-width:640px){
    nav ul{display:none;}
    .hero{padding:50px 6vw 40px;}
  }
</style>
</head>
<body>

<header>
  <div class="brand">STAPLE <span>&</span> CO.</div>
  <nav>
    <ul>
      <li><a href="#">Shirts</a></li>
      <li><a href="#">T-Shirts</a></li>
      <li><a href="#">Jackets</a></li>
      <li><a href="#">About</a></li>
    </ul>
  </nav>
  <div class="cart-pill">CART (0)</div>
</header>

<section class="hero">
  <span class="eyebrow">Fall Capsule — 2026</span>
  <h1>Clothes that fit before they arrive.</h1>
  <p>Upload a photo, tap try it on, see it on your own body — not a model's.</p>
</section>

<div class="filters">
  <button class="filter-btn active" data-filter="all">All</button>
</div>

<div class="grid" id="product-grid"></div>

<footer>
  <div class="f-brand">STAPLE & CO.</div>
  <div class="f-note">DEMO STOREFRONT — POWERED BY TRYON.AI WIDGET — FOR INTERNAL TESTING ONLY (PRO KEY)</div>
</footer>

<script>
/* Only these 5 have real deployed photos in frontend/public/garments/.
   Add more real .jpg files there + redeploy frontend to expand this list. */
const CATALOG = [
  { id:'p1', name:'Classic White Shirt', cat:'shirt', price:'$68', image:'https://vton-saas-zeta.vercel.app/garments/white-shirt.jpg' },
  { id:'p2', name:'Navy Blue Polo', cat:'tee', price:'$42', image:'https://vton-saas-zeta.vercel.app/garments/navy-polo.jpg' },
  { id:'p3', name:'Striped Oxford', cat:'shirt', price:'$74', image:'https://vton-saas-zeta.vercel.app/garments/striped-oxford.jpg' },
  { id:'p4', name:'Black Crew Tee', cat:'tee', price:'$28', image:'https://vton-saas-zeta.vercel.app/garments/black-tee.jpg' },
  { id:'p5', name:'Pink Stripe Shirt', cat:'shirt', price:'$66', image:'https://vton-saas-zeta.vercel.app/garments/pink-stripe-shirt.jpg' },
{ id:'p6', name:'Striped Blue Shirt', cat:'shirt', price:'$72', image:'https://vton-saas-zeta.vercel.app/garments/striped-blue-shirt.webp' },
{ id:'p7', name:'Lapel Shirt', cat:'shirt', price:'$85', image:'https://vton-saas-zeta.vercel.app/garments/lapel-shirt.jpg' },
];

function render(){
  const grid = document.getElementById('product-grid');
  grid.innerHTML = '';
  CATALOG.forEach(item => {
    const card = document.createElement('div');
    card.className = 'tag-card';
    card.innerHTML = `
      <div class="tag-hole"></div>
      <div class="art-frame"><img src="${item.image}" alt="${item.name}"></div>
      <div class="tag-meta">
        <div class="cat">${item.cat}</div>
        <h3>${item.name}</h3>
        <div class="price">${item.price} · SKU-${item.id.toUpperCase()}</div>
      </div>
      <button class="tryon-btn tryon-trigger"
        data-garment-image="${item.image}"
        data-garment-desc="a ${item.name.toLowerCase()}">
        Try It On
      </button>
    `;
    grid.appendChild(card);
  });
}

render();
</script>

<script
  src="https://vton-saas-zeta.vercel.app/widget.js"
  data-api-key="4R-kurTWbgJ7JipU2z5z_F5m6773wb-mAtAKSpS_328"
  data-api-url="https://tryon-saas-backend.onrender.com"
  async>
</script>

</body>
</html>
